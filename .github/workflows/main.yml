name: Update Tokens

on:
  schedule:
    - cron: '0 */7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tokens:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run token update script
        run: python update_tokens.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git add tokens.json

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update tokens [automated]"
            git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Abs123213/-Likes-Meyes.git main
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Abs123213/-Likes-Meyes.git main
          fi
